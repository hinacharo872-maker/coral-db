<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0891b2" />
    <title>接続できません | ReefChart Lite</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020617;
        color: #e2e8f0;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(100%, 420px);
      }

      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }

      p {
        margin: 0 0 24px;
        color: #94a3b8;
        line-height: 1.7;
      }

      button {
        width: 100%;
        min-height: 52px;
        border: 0;
        border-radius: 8px;
        background: #0891b2;
        color: white;
        font: inherit;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>インターネットに接続できません</h1>
      <p>接続を確認してから、もう一度読み込んでください。入力済みのデモデータは端末内に残ります。</p>
      <button type="button" onclick="window.location.reload()">もう一度読み込む</button>
    </main>
  </body>
</html>
